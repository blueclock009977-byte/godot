<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Frost Giant: 霜の巨人 -->
  <!-- Body -->
  <rect x="14" y="24" width="20" height="22" fill="#78909C" rx="3"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="12" fill="#90A4AE"/>
  <!-- Ice beard -->
  <path d="M14 18 Q16 26 18 22 Q20 28 22 24 Q24 30 26 24 Q28 28 30 22 Q32 26 34 18" fill="#B3E5FC"/>
  <!-- Eyes -->
  <circle cx="20" cy="12" r="3" fill="#4FC3F7"/>
  <circle cx="28" cy="12" r="3" fill="#4FC3F7"/>
  <circle cx="20" cy="12" r="1.5" fill="#fff"/>
  <circle cx="28" cy="12" r="1.5" fill="#fff"/>
  <!-- Eyebrows -->
  <line x1="16" y1="8" x2="22" y2="10" stroke="#607D8B" stroke-width="2"/>
  <line x1="32" y1="8" x2="26" y2="10" stroke="#607D8B" stroke-width="2"/>
  <!-- Arms -->
  <rect x="4" y="24" width="10" height="16" fill="#90A4AE" rx="3"/>
  <rect x="34" y="24" width="10" height="16" fill="#90A4AE" rx="3"/>
  <!-- Ice patterns -->
  <polygon points="6,28 8,24 10,28 8,26" fill="#E1F5FE"/>
  <polygon points="38,28 40,24 42,28 40,26" fill="#E1F5FE"/>
  <polygon points="20,30 24,26 28,30 24,28" fill="#E1F5FE"/>
  <!-- Feet -->
  <rect x="14" y="42" width="8" height="6" fill="#78909C" rx="2"/>
  <rect x="26" y="42" width="8" height="6" fill="#78909C" rx="2"/>
</svg>
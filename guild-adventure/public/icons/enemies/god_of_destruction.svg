<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- God of Destruction: 破壊神 -->
  <!-- Dark aura -->
  <circle cx="24" cy="24" r="22" fill="#1A237E" opacity="0.3"/>
  <!-- Wings of destruction -->
  <path d="M2 16 L6 6 L12 12 L18 2 L22 14" fill="#311B92"/>
  <path d="M46 16 L42 6 L36 12 L30 2 L26 14" fill="#311B92"/>
  <!-- Body -->
  <ellipse cx="24" cy="36" rx="12" ry="10" fill="#4A148C"/>
  <ellipse cx="24" cy="26" rx="10" ry="10" fill="#6A1B9A"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="10" fill="#7B1FA2"/>
  <!-- Multiple horns -->
  <polygon points="14,8 10,0 16,6" fill="#311B92"/>
  <polygon points="20,6 18,0 22,4" fill="#311B92"/>
  <polygon points="28,6 30,0 26,4" fill="#311B92"/>
  <polygon points="34,8 38,0 32,6" fill="#311B92"/>
  <!-- Glowing eyes -->
  <circle cx="20" cy="14" r="4" fill="#FF1744"/>
  <circle cx="28" cy="14" r="4" fill="#FF1744"/>
  <circle cx="20" cy="14" r="2" fill="#FFEB3B"/>
  <circle cx="28" cy="14" r="2" fill="#FFEB3B"/>
  <!-- Third eye -->
  <circle cx="24" cy="8" r="2" fill="#D500F9"/>
  <!-- Mouth -->
  <path d="M18 20 Q24 26 30 20" stroke="#311B92" stroke-width="2" fill="none"/>
  <polygon points="20,20 21,23 22,20" fill="#fff"/>
  <polygon points="26,20 27,23 28,20" fill="#fff"/>
  <!-- Arms with claws -->
  <ellipse cx="6" cy="28" rx="6" ry="10" fill="#6A1B9A"/>
  <ellipse cx="42" cy="28" rx="6" ry="10" fill="#6A1B9A"/>
  <!-- Fire/Energy orbs -->
  <circle cx="4" cy="20" r="3" fill="#FF5722"/>
  <circle cx="44" cy="20" r="3" fill="#FF5722"/>
</svg>
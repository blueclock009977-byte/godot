<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Ancient Dragon: 古代龍 -->
  <!-- Body -->
  <ellipse cx="24" cy="36" rx="18" ry="10" fill="#5D4037"/>
  <!-- Wings -->
  <path d="M4 18 L8 8 L14 14 L20 4 L24 16" fill="#6D4C41"/>
  <path d="M44 18 L40 8 L34 14 L28 4 L24 16" fill="#6D4C41"/>
  <!-- Neck and head -->
  <path d="M34 30 Q38 24 42 20 Q44 16 42 14" stroke="#5D4037" stroke-width="8" fill="none"/>
  <circle cx="42" cy="12" r="6" fill="#6D4C41"/>
  <!-- Horns -->
  <polygon points="38,6 36,0 40,4" fill="#3E2723"/>
  <polygon points="46,6 48,0 44,4" fill="#3E2723"/>
  <!-- Eyes -->
  <circle cx="44" cy="10" r="2" fill="#FF5722"/>
  <circle cx="44" cy="10" r="1" fill="#FFEB3B"/>
  <!-- Snout -->
  <ellipse cx="46" cy="14" rx="3" ry="2" fill="#5D4037"/>
  <!-- Spines -->
  <polygon points="24,26 26,22 28,26" fill="#3E2723"/>
  <polygon points="28,28 30,24 32,28" fill="#3E2723"/>
  <polygon points="32,30 34,26 36,30" fill="#3E2723"/>
  <!-- Tail -->
  <path d="M6 36 Q2 34 4 30 Q0 32 2 28" stroke="#5D4037" stroke-width="6" fill="none"/>
  <polygon points="2,28 0,24 4,26" fill="#3E2723"/>
  <!-- Legs -->
  <ellipse cx="14" cy="44" rx="5" ry="4" fill="#4E342E"/>
  <ellipse cx="34" cy="44" rx="5" ry="4" fill="#4E342E"/>
  <!-- Fire breath -->
  <circle cx="48" cy="16" r="2" fill="#FF5722" opacity="0.7"/>
  <circle cx="46" cy="18" r="1.5" fill="#FF9800" opacity="0.5"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Scorpion: 大サソリ -->
  <!-- Body -->
  <ellipse cx="24" cy="32" rx="14" ry="8" fill="#5D4037"/>
  <ellipse cx="24" cy="30" rx="10" ry="6" fill="#795548"/>
  <!-- Head -->
  <circle cx="36" cy="28" r="6" fill="#6D4C41"/>
  <circle cx="38" cy="26" r="2" fill="#F44336"/>
  <circle cx="42" cy="28" r="2" fill="#F44336"/>
  <!-- Pincers -->
  <ellipse cx="8" cy="24" rx="6" ry="4" fill="#795548"/>
  <ellipse cx="4" cy="22" rx="4" ry="3" fill="#6D4C41"/>
  <path d="M2 20 L6 22 L2 24" stroke="#5D4037" stroke-width="2" fill="none"/>
  <ellipse cx="16" cy="20" rx="6" ry="4" fill="#795548"/>
  <ellipse cx="12" cy="18" rx="4" ry="3" fill="#6D4C41"/>
  <path d="M10 16 L14 18 L10 20" stroke="#5D4037" stroke-width="2" fill="none"/>
  <!-- Tail -->
  <path d="M24 38 Q20 42 18 38 Q14 34 12 38 Q8 42 6 36 Q2 30 4 24" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Stinger -->

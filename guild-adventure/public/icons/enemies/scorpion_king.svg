  <!-- Legs -->
  <line x1="18" y1="36" x2="14" y2="42" stroke="#5D4037" stroke-width="2"/>
  <line x1="22" y1="38" x2="20" y2="44" stroke="#5D4037" stroke-width="2"/>
  <line x1="26" y1="38" x2="28" y2="44" stroke="#5D4037" stroke-width="2"/>
  <line x1="30" y1="36" x2="34" y2="42" stroke="#5D4037" stroke-width="2"/>
</svg>
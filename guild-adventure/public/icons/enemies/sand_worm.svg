<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sand Worm: 砂虫 -->
  <!-- Body segments -->
  <ellipse cx="8" cy="40" rx="6" ry="8" fill="#D7CCC8"/>
  <ellipse cx="16" cy="34" rx="7" ry="9" fill="#BCAAA4"/>
  <ellipse cx="26" cy="26" rx="8" ry="10" fill="#A1887F"/>
  <ellipse cx="36" cy="16" rx="9" ry="11" fill="#8D6E63"/>
  <!-- Head -->
  <circle cx="40" cy="10" r="8" fill="#795548"/>
  <!-- Mouth with teeth -->
  <circle cx="44" cy="8" r="6" fill="#5D4037"/>
  <circle cx="44" cy="8" r="4" fill="#3E2723"/>
  <polygon points="40,4 42,8 40,6" fill="#fff"/>
  <polygon points="48,4 46,8 48,6" fill="#fff"/>
  <polygon points="40,12 42,8 40,10" fill="#fff"/>
  <polygon points="48,12 46,8 48,10" fill="#fff"/>
  <polygon points="44,2 44,6 42,4" fill="#fff"/>
  <polygon points="44,14 44,10 46,12" fill="#fff"/>
  <!-- Sand particles -->
  <circle cx="4" cy="44" r="2" fill="#FFCC80" opacity="0.6"/>
  <circle cx="12" cy="42" r="1.5" fill="#FFCC80" opacity="0.6"/>
  <circle cx="20" cy="38" r="2" fill="#FFCC80" opacity="0.6"/>
  <circle cx="30" cy="32" r="1.5" fill="#FFCC80" opacity="0.6"/>
</svg>
  <!-- Tail with flames -->
  <path d="M10 28 Q6 30 4 26 Q2 30 0 26" stroke="#FF6D00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M2 24 Q0 20 4 22" stroke="#FF9800" stroke-width="2" fill="none"/>

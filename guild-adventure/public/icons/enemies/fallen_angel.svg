<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Fallen Angel: 堕天使 -->
  <!-- Dark wings -->
  <path d="M4 20 Q8 10 14 16 Q12 8 20 14 Q18 6 24 12" fill="#37474F"/>
  <path d="M44 20 Q40 10 34 16 Q36 8 28 14 Q30 6 24 12" fill="#37474F"/>
  <!-- Body -->
  <ellipse cx="24" cy="36" rx="8" ry="10" fill="#263238"/>
  <!-- Torso -->
  <ellipse cx="24" cy="26" rx="6" ry="8" fill="#455A64"/>
  <!-- Head -->
  <circle cx="24" cy="14" r="8" fill="#ECEFF1"/>
  <!-- Corrupted halo -->
  <ellipse cx="24" cy="4" rx="8" ry="2" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Eyes -->
  <circle cx="21" cy="13" r="2" fill="#F44336"/>
  <circle cx="27" cy="13" r="2" fill="#F44336"/>
  <circle cx="21" cy="13" r="1" fill="#FFEB3B"/>
  <circle cx="27" cy="13" r="1" fill="#FFEB3B"/>
  <!-- Mouth -->
  <path d="M22 18 Q24 16 26 18" stroke="#455A64" stroke-width="1" fill="none"/>
  <!-- Hair -->
  <path d="M16 12 Q18 8 20 10 Q22 6 24 8 Q26 6 28 10 Q30 8 32 12" fill="#607D8B"/>
  <!-- Arms -->
  <line x1="18" y1="28" x2="10" y2="36" stroke="#455A64" stroke-width="3"/>
  <line x1="30" y1="28" x2="38" y2="36" stroke="#455A64" stroke-width="3"/>
  <!-- Dark sword -->
  <line x1="38" y1="36" x2="42" y2="20" stroke="#263238" stroke-width="3"/>
  <polygon points="42,20 40,16 44,16" fill="#37474F"/>
  <!-- Dark aura -->
  <circle cx="24" cy="26" r="20" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>
</svg>
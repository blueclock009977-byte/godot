<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sphinx: スフィンクス -->
  <!-- Lion body -->
  <ellipse cx="24" cy="36" rx="18" ry="10" fill="#FFB74D"/>
  <!-- Front paws -->
  <ellipse cx="10" cy="42" rx="6" ry="4" fill="#FFA726"/>
  <ellipse cx="38" cy="42" rx="6" ry="4" fill="#FFA726"/>
  <!-- Human head -->
  <circle cx="24" cy="18" r="12" fill="#FFCC80"/>
  <!-- Egyptian headdress -->
  <path d="M8 20 L12 6 L24 4 L36 6 L40 20 L36 24 L32 20 L24 22 L16 20 L12 24 Z" fill="#1565C0"/>
  <path d="M12 6 L24 4 L36 6 L32 14 L24 12 L16 14 Z" fill="#FFD54F"/>
  <!-- Face -->
  <circle cx="20" cy="18" r="2" fill="#5D4037"/>
  <circle cx="28" cy="18" r="2" fill="#5D4037"/>
  <path d="M22 24 Q24 26 26 24" stroke="#5D4037" stroke-width="1.5" fill="none"/>
  <!-- Beard -->
  <rect x="22" y="28" width="4" height="8" fill="#1565C0"/>
  <!-- Wings hint -->
  <path d="M4 28 Q8 22 14 26" stroke="#FFA726" stroke-width="3" fill="none"/>
  <path d="M44 28 Q40 22 34 26" stroke="#FFA726" stroke-width="3" fill="none"/>
  <!-- Tail -->
  <path d="M42 36 Q46 34 44 30" stroke="#FFB74D" stroke-width="3" fill="none"/>
  <circle cx="44" cy="30" r="3" fill="#8D6E63"/>
</svg>
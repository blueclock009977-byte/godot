<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Mummy: ミイラ -->
  <!-- Body wrapped in bandages -->
  <rect x="16" y="24" width="16" height="22" fill="#D7CCC8" rx="2"/>
  <circle cx="24" cy="16" r="12" fill="#EFEBE9"/>
  <!-- Bandage lines -->
  <line x1="12" y1="14" x2="36" y2="14" stroke="#BCAAA4" stroke-width="2"/>
  <line x1="12" y1="18" x2="36" y2="18" stroke="#BCAAA4" stroke-width="2"/>
  <line x1="12" y1="22" x2="36" y2="22" stroke="#BCAAA4" stroke-width="2"/>
  <line x1="16" y1="28" x2="32" y2="28" stroke="#BCAAA4" stroke-width="2"/>
  <line x1="16" y1="34" x2="32" y2="34" stroke="#BCAAA4" stroke-width="2"/>
  <line x1="16" y1="40" x2="32" y2="40" stroke="#BCAAA4" stroke-width="2"/>
  <!-- Eyes glowing through bandages -->
  <ellipse cx="20" cy="16" rx="3" ry="2" fill="#333"/>
  <ellipse cx="28" cy="16" rx="3" ry="2" fill="#333"/>
  <circle cx="20" cy="16" r="1.5" fill="#76FF03"/>
  <circle cx="28" cy="16" r="1.5" fill="#76FF03"/>
  <!-- Arms -->
  <rect x="6" y="24" width="10" height="6" fill="#EFEBE9" rx="2"/>
  <rect x="32" y="24" width="10" height="6" fill="#EFEBE9" rx="2"/>
  <line x1="6" y1="26" x2="16" y2="26" stroke="#BCAAA4" stroke-width="1.5"/>
  <line x1="32" y1="26" x2="42" y2="26" stroke="#BCAAA4" stroke-width="1.5"/>
  <!-- Loose bandage -->
  <path d="M36 10 Q40 8 42 12 Q44 16 40 18" stroke="#D7CCC8" stroke-width="2" fill="none"/>
</svg>
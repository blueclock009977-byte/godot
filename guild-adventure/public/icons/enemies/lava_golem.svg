  <circle cx="24" cy="18" r="14" fill="#37474F"/>
  <!-- Lava cracks -->
  <path d="M16 10 L18 16 L16 22" stroke="#FF5722" stroke-width="2" fill="none"/>
  <path d="M32 8 L30 14 L32 20" stroke="#FF5722" stroke-width="2" fill="none"/>
  <path d="M20 26 L24 32 L28 26" stroke="#FF5722" stroke-width="2" fill="none"/>
  <path d="M14 34 L18 38 L14 42" stroke="#FF5722" stroke-width="2" fill="none"/>
  <path d="M34 34 L30 38 L34 42" stroke="#FF5722" stroke-width="2" fill="none"/>
  <!-- Glowing eyes -->
  <circle cx="19" cy="16" r="4" fill="#FF9800"/>
  <circle cx="29" cy="16" r="4" fill="#FF9800"/>
  <circle cx="19" cy="16" r="2" fill="#FFEB3B"/>
  <circle cx="29" cy="16" r="2" fill="#FFEB3B"/>
  <!-- Arms -->
  <rect x="4" y="20" width="10" height="8" fill="#37474F" rx="2"/>

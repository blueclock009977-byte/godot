  <path d="M4 22 L8 24 L4 26" stroke="#FF5722" stroke-width="1.5" fill="none"/>
  <path d="M44 22 L40 24 L44 26" stroke="#FF5722" stroke-width="1.5" fill="none"/>
  <!-- Feet -->
